<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sophie – Continue</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:white;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b0f14;
  position:relative;
  overflow:hidden;
}

.bg{
  position:absolute; inset:-40px;
  background:
    radial-gradient(900px 500px at 20% 25%, rgba(140,180,255,.18), transparent 60%),
    radial-gradient(700px 500px at 80% 65%, rgba(255,170,210,.14), transparent 60%),
    radial-gradient(900px 600px at 50% 110%, rgba(120,255,210,.10), transparent 65%);
}

.wrap{
  width:min(620px,92vw);
  position:relative;
  z-index:2;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
  font-size:13px;
  opacity:.85;
}

.lang{
  display:flex;
  gap:8px;
}

.lang span{
  cursor:pointer;
  padding:4px 8px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
}

.lang .active{
  background:white;
  color:#0b0f14;
}

.panel{
  border-radius:24px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  box-shadow:0 10px 40px rgba(0,0,0,.35);
  padding:28px;
  text-align:center;
  backdrop-filter:blur(10px);
}

h1{
  margin:0 0 12px;
  font-size:28px;
  line-height:1.2;
}

.lead{
  margin:0;
  font-size:16px;
  color:rgba(255,255,255,.78);
}

.note{
  margin-top:14px;
  font-size:14px;
  opacity:.75;
}

.price{
  margin-top:24px;
  font-size:32px;
  font-weight:800;
}

.per{
  font-size:14px;
  opacity:.7;
  margin-top:4px;
}

button{
  margin-top:22px;
  width:100%;
  padding:16px;
  border-radius:16px;
  border:0;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  background:white;
  color:#0b0f14;
}

button:hover{ opacity:.95; }

button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

.btn-secondary{
  margin-top:10px;
  background:rgba(255,255,255,.14);
  color:white;
  border:1px solid rgba(255,255,255,.18);
}

/* NEW: prepaid section */
.divider{
  margin:22px 0 14px;
  height:1px;
  background:rgba(255,255,255,.12);
}

.subhead{
  margin:0;
  font-size:14px;
  font-weight:800;
  letter-spacing:.2px;
  text-transform:uppercase;
  opacity:.85;
  text-align:left;
}

.prepaid-note{
  margin:8px 0 10px;
  font-size:13px;
  color:rgba(255,255,255,.75);
  text-align:left;
}

.packs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.pack{
  margin-top:0;
  width:100%;
  padding:12px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.10);
  color:white;
  font-weight:900;
  cursor:pointer;
}

.pack:hover{ background:rgba(255,255,255,.14); }

.pack span{
  display:block;
  font-size:12px;
  font-weight:600;
  opacity:.75;
  margin-top:4px;
}

@media (max-width:520px){
  .packs{ grid-template-columns:1fr; }
}

.msg{
  margin-top:10px;
  font-size:13px;
  color:rgba(255,255,255,.78);
  min-height:18px;
}

.legal{
  margin-top:18px;
  font-size:13px;
  color:rgba(255,255,255,.75);
  text-align:left;
}

.legal label{
  display:flex;
  gap:10px;
  margin:10px 0;
}

.footer{
  margin-top:16px;
  text-align:center;
  font-size:12px;
  opacity:.6;
}

.footer a{
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">

  <div class="top">
    <div>Sophie</div>
    <div class="lang">
      <span id="langDE">DE</span>
      <span id="langEN">EN</span>
    </div>
  </div>

  <div class="panel">

    <h1 id="tH1"></h1>
    <p class="lead" id="tLead"></p>
    <p class="note" id="tNote"></p>

    <div class="price">
      19,90€
      <div class="per" id="tPer"></div>
    </div>

    <button id="btnContinue" disabled></button>
    <button class="btn-secondary" id="btnLogin"></button>

    <!-- NEW: Prepaid -->
    <div class="divider"></div>
    <p class="subhead" id="tPrepaidTitle"></p>
    <p class="prepaid-note" id="tPrepaidNote"></p>

    <div class="packs">
      <button class="pack" id="topup5"  disabled>
        €5
        <span id="tPack5"></span>
      </button>
      <button class="pack" id="topup10" disabled>
        €10
        <span id="tPack10"></span>
      </button>
      <button class="pack" id="topup20" disabled>
        €20
        <span id="tPack20"></span>
      </button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="legal">
      <label>
        <input type="checkbox" id="legal1">
        <span id="tLegal1"></span>
      </label>

      <label>
        <input type="checkbox" id="legal2">
        <span id="tLegal2"></span>
      </label>
    </div>

  </div>

  <div class="footer">
    <a href="/impressum.html">Impressum</a> ·
    <a href="/privacy.html">Privacy</a>
  </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// ✅ Setze deinen echten Public ANON Key ein
const SUPABASE_URL = "https://ohzfojsbmzinpxhcynpt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oemZvanNibXppbnB4aGN5bnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0Mzc1MjcsImV4cCI6MjA4NzAxMzUyN30.7eGSeEvOCj9vMqFJj9C0SR8DiiYygbFUvpQ8rIVEc0I";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TEXT = {
  de:{
    h1:"Warte. Geh noch nicht.",
    lead:"Sophie wollte dich gerade etwas fragen.",
    note:"Wenn du willst, machen wir genau hier weiter.",
    per:"pro Monat",
    btn:"Weiter mit Sophie",
    login:"Ich bin noch nicht eingeloggt",
    loading:"Einen Moment…",
    checkoutError:"Fehler beim Starten des Checkouts.",
    topupError:"Fehler beim Starten des Top-ups.",
    prepaidTitle:"Prepaid Zeit (ohne Abo)",
    prepaidNote:"Perfekt, wenn du nur gelegentlich reden willst. Kein Abo nötig.",
    pack5:"ca. 60 Min",
    pack10:"ca. 140 Min",
    pack20:"ca. 320 Min",
    topupLoading:"Checkout wird geöffnet…",
    legal1:`Ich akzeptiere die <a href="/terms.html" target="_blank" rel="noopener">AGB</a> und die <a href="/privacy.html" target="_blank" rel="noopener">Datenschutzerklärung</a>.`,
    legal2:`Ich stimme ausdrücklich zu, dass die Ausführung der Dienstleistung sofort beginnt. Mir ist bekannt, dass ich dadurch mein Widerrufsrecht verliere.`,
    legalMissing:"Bitte bestätige beide Checkboxen."
  },
  en:{
    h1:"Wait. Don’t go yet.",
    lead:"Sophie was about to ask you something.",
    note:"If you want, we continue right here.",
    per:"per month",
    btn:"Continue with Sophie",
    login:"I'm not logged in",
    loading:"One moment…",
    checkoutError:"Failed to start checkout.",
    topupError:"Failed to start top-up checkout.",
    prepaidTitle:"Prepaid time (no subscription)",
    prepaidNote:"Perfect if you just want to talk occasionally. No subscription required.",
    pack5:"~60 min",
    pack10:"~140 min",
    pack20:"~320 min",
    topupLoading:"Opening checkout…",
    legal1:`I accept the <a href="/terms.html" target="_blank" rel="noopener">Terms</a> and the <a href="/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.`,
    legal2:`I agree that the service begins immediately and acknowledge that I lose my right of withdrawal once the service starts.`,
    legalMissing:"Please confirm both checkboxes."
  }
};

const btnContinue = document.getElementById("btnContinue");
const btnLogin = document.getElementById("btnLogin");
const msg = document.getElementById("msg");
const c1 = document.getElementById("legal1");
const c2 = document.getElementById("legal2");

// NEW: topup buttons
const topup5 = document.getElementById("topup5");
const topup10 = document.getElementById("topup10");
const topup20 = document.getElementById("topup20");

let currentLang = "en";
const navLang = (navigator.language || "").toLowerCase();
if (navLang.startsWith("de")) currentLang = "de";

function setLang(l){
  currentLang = l;

  document.getElementById("langDE").classList.toggle("active", l==="de");
  document.getElementById("langEN").classList.toggle("active", l==="en");

  const t = TEXT[l];
  document.getElementById("tH1").textContent = t.h1;
  document.getElementById("tLead").textContent = t.lead;
  document.getElementById("tNote").textContent = t.note;
  document.getElementById("tPer").textContent = t.per;

  btnContinue.textContent = t.btn;
  btnLogin.textContent = t.login;

  // NEW: prepaid text
  document.getElementById("tPrepaidTitle").textContent = t.prepaidTitle;
  document.getElementById("tPrepaidNote").textContent = t.prepaidNote;
  document.getElementById("tPack5").textContent = t.pack5;
  document.getElementById("tPack10").textContent = t.pack10;
  document.getElementById("tPack20").textContent = t.pack20;

  document.getElementById("tLegal1").innerHTML = t.legal1;
  document.getElementById("tLegal2").innerHTML = t.legal2;

  updateEnabled();
}

document.getElementById("langDE").onclick = () => setLang("de");
document.getElementById("langEN").onclick = () => setLang("en");

function updateEnabled(){
  const ok = (c1.checked && c2.checked);
  btnContinue.disabled = !ok;

  // NEW: allow topup only if legal accepted as well
  topup5.disabled = !ok;
  topup10.disabled = !ok;
  topup20.disabled = !ok;
}
c1.onchange = updateEnabled;
c2.onchange = updateEnabled;

function goLogin(){
  // ✅ nach Login wieder hierher zurück
  const redirect = encodeURIComponent(window.location.pathname + window.location.search);
  window.location.href = `/login/?redirect=${redirect}`;
}

btnLogin.onclick = goLogin;

async function getTokenOrLogin(){
  const { data: { session } } = await supabase.auth.getSession();
  if (!session?.access_token) {
    goLogin();
    return null;
  }
  return session.access_token;
}

async function startCheckout(){
  msg.textContent = "";

  if (!(c1.checked && c2.checked)) {
    msg.textContent = TEXT[currentLang].legalMissing;
    return;
  }

  btnContinue.disabled = true;
  btnContinue.textContent = TEXT[currentLang].loading;

  try {
    const token = await getTokenOrLogin();
    if (!token) return;

    const res = await fetch("/api/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      },
      body: JSON.stringify({
        plan: "plus",
        legal: {
          termsAccepted: true,
          privacyAccepted: true,
          waiverAccepted: true,
          lang: currentLang,
          at: new Date().toISOString()
        }
      }),
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok || !data?.url) {
      msg.textContent = (data?.error ? `Error: ${data.error}` : TEXT[currentLang].checkoutError);
      return;
    }

    window.location.href = data.url;

  } catch (e) {
    msg.textContent = TEXT[currentLang].checkoutError;
  } finally {
    btnContinue.textContent = TEXT[currentLang].btn;
    updateEnabled();
  }
}

async function startTopup(pack){
  msg.textContent = "";

  if (!(c1.checked && c2.checked)) {
    msg.textContent = TEXT[currentLang].legalMissing;
    return;
  }

  // disable pack buttons while loading
  const t = TEXT[currentLang];
  const old = { b: btnContinue.textContent };
  btnContinue.textContent = t.btn;
  topup5.disabled = true; topup10.disabled = true; topup20.disabled = true;
  msg.textContent = t.topupLoading;

  try {
    const token = await getTokenOrLogin();
    if (!token) return;

    const res = await fetch("/api/create-topup-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      },
      body: JSON.stringify({
        pack,
        legal: {
          termsAccepted: true,
          privacyAccepted: true,
          waiverAccepted: true,
          lang: currentLang,
          at: new Date().toISOString()
        }
      }),
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok || !data?.url) {
      msg.textContent = (data?.error ? `Error: ${data.error}` : t.topupError);
      return;
    }

    window.location.href = data.url;

  } catch (e) {
    msg.textContent = t.topupError;
  } finally {
    msg.textContent = "";
    updateEnabled();
  }
}

btnContinue.onclick = startCheckout;
topup5.onclick = () => startTopup(5);
topup10.onclick = () => startTopup(10);
topup20.onclick = () => startTopup(20);

// Hide login button if already logged in
(async function init(){
  setLang(currentLang);

  const { data: { session } } = await supabase.auth.getSession();
  if (session?.access_token) {
    btnLogin.style.display = "none";
  }
})();
</script>

</body>
</html>
