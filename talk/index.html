<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sophie Voice</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:white;
  text-align:center;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b0f14;
  position:relative;
  overflow:hidden;
}
.topbar{
  position:fixed; top:0; left:0; right:0;
  z-index:3;
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 16px;
}
.topbar a{
  color:rgba(255,255,255,.9);
  text-decoration:none;
  font-weight:600;
  padding:8px 10px;
  border-radius:10px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
}
.topbar button{
  color:rgba(255,255,255,.9);
  font-weight:600;
  padding:8px 10px;
  border-radius:10px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  cursor:pointer;
}
.topbar button:disabled{ opacity:.5; cursor:not-allowed; }
.bg{
  position:fixed; inset:0;
  background:url("/sophie.jpg") center/cover no-repeat;
  opacity:0; transition:opacity .5s ease; z-index:0;
}
.overlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,.55);
  opacity:0; transition:opacity .5s ease; z-index:1;
}
.bg.active,.overlay.active{ opacity:1; }
.wrap{
  position:relative; z-index:2;
  width:90%; max-width:420px;
  padding-top:40px;
}
.btn{
  display:block; width:100%;
  margin:0 auto 15px;
  padding:18px 20px;
  font-size:20px; font-weight:700;
  border:none; border-radius:12px;
  cursor:pointer;
}
#start{ background:#ffffff; color:#000; }
#end{
  background:rgba(255,255,255,.15);
  color:#fff;
  border:1px solid rgba(255,255,255,.3);
}
.btn:disabled{ opacity:.5; cursor:not-allowed; }
.status{ margin-bottom:10px; opacity:.88; }
.timer{ margin-bottom:20px; opacity:.75; font-size:14px; }
</style>
</head>

<body>
<div class="bg" id="bg"></div>
<div class="overlay" id="overlay"></div>

<div class="topbar">
  <a href="/">← Landing</a>
  <button id="logoutBtn" type="button">Logout</button>
</div>

<div class="wrap">
  <h2 id="headline">Sophie is here.</h2>
  <div class="status" id="status">Whenever you’re ready.</div>
  <div class="timer" id="timer">Zeit: --:--</div>

  <button id="start" class="btn">Enter the Room</button>
  <button id="end" class="btn" disabled>Leave the Room</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// ✅ Supabase Config
const SUPABASE_URL = "https://ohzfojsbmzinpxhcynpt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oemZvanNibXppbnB4aGN5bnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0Mzc1MjcsImV4cCI6MjA4NzAxMzUyN30.7eGSeEvOCj9vMqFJj9C0SR8DiiYygbFUvpQ8rIVEc0I";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ✅ Frontend Login Guard
{
  const { data: { session } } = await supabase.auth.getSession();
  if (!session?.user) window.location.href = "/login/";
}

// Helpers
async function safeJson(res) { try { return await res.json(); } catch { return null; } }

// --- Tracking helper (POST /api/track) ---
async function track(event_name, meta = {}) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.access_token) return;

    await fetch("/api/track", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ event_name, meta }),
      keepalive: true,
    });
  } catch (_) {}
}

// --- Usage reporting helper (POST /api/usage) ---
async function reportUsage(secondsUsed) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.access_token) return;

    await fetch("/api/usage", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ seconds_used: secondsUsed }),
      keepalive: true,
    });
  } catch (_) {}
}

// --- Conversation buffer (for memory update) ---
let convoLog = [];
let partialAssistant = "";
let lastAssistantFinal = "";
const userTranscriptBuffer = new Map();

// --- Memory update helper (POST /api/memory-update) ---
async function sendMemoryUpdate(secondsUsed) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.access_token) return;

    const finalA = (partialAssistant || "").trim();
    if (finalA) {
      convoLog.push({ role: "assistant", text: finalA });
      partialAssistant = "";
    }

    const cleaned = (convoLog || []).filter(t => {
      const role = String(t?.role || "");
      const text = String(t?.text || "").trim();
      if (!text) return false;
      if (role === "user" && text.toLowerCase() === "bye.") return false;
      return true;
    });

    const payload = cleaned.slice(-80);

    await fetch("/api/memory-update", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ transcript: payload, seconds_used: secondsUsed }),
      keepalive: true,
    });

    convoLog = [];
  } catch (_) {}
}

// UI
const startBtn = document.getElementById("start");
const endBtn   = document.getElementById("end");
const statusEl = document.getElementById("status");
const timerEl  = document.getElementById("timer");
const headline = document.getElementById("headline");
const bg = document.getElementById("bg");
const overlay = document.getElementById("overlay");
const logoutBtn = document.getElementById("logoutBtn");

// Voice vars
let pc = null;
let stream = null;
let audioEl = null;

// DataChannel
let dc = null;

// Timer vars
let countdown = null;
let remainingSeconds = 0;
let isPremium = false;
let plan = null;

// Session meta
let talkStartedAt = null;

// Teaser timers
let softSteerTimeout = null;
let hardCutTimeout = null;
let finaleTriggered = false;

let teaserMode = false;
let teaserSoftAt = 0;
let teaserHardAt = 0;

// ✅ fixed audio path
let finaleAudioUrl = "/audio/cliffhanger.mp3";

// Prewarmed audio element
let finaleAudioEl = null;
let audioUnlocked = false;

// ✅ Cut-on-beat state
let finaleArmed = false;
let assistantSpeaking = false;
let armedAtMs = 0;
let finaleMaxWaitTimeout = null;

function setStatus(txt){ statusEl.textContent = txt; }

function showBackground(on){
  bg.classList.toggle("active", !!on);
  overlay.classList.toggle("active", !!on);
}

function formatMMSS(sec){
  const s = Math.max(0, Math.floor(Number(sec) || 0));
  const m = String(Math.floor(s/60)).padStart(2,"0");
  const r = String(s%60).padStart(2,"0");
  return `${m}:${r}`;
}

function renderTimer(){
  timerEl.textContent = `Zeit: ${formatMMSS(remainingSeconds)}`;
}
renderTimer();

function startCountdown(){
  if (countdown) clearInterval(countdown);
  countdown = setInterval(() => {
    remainingSeconds -= 1;
    renderTimer();

    if (remainingSeconds <= 0) {
      stopCountdown();
      setStatus("Zeitlimit erreicht.");
      track("time_limit_reached", { plan: plan || null });

      stopVoice(true).finally(() => {
        window.location.href = "/pricing/";
      });
    }
  }, 1000);
}

function stopCountdown(){
  if (countdown) { clearInterval(countdown); countdown = null; }
}

function clearFinaleTimers(){
  if (softSteerTimeout) { clearTimeout(softSteerTimeout); softSteerTimeout = null; }
  if (hardCutTimeout) { clearTimeout(hardCutTimeout); hardCutTimeout = null; }
  if (finaleMaxWaitTimeout) { clearTimeout(finaleMaxWaitTimeout); finaleMaxWaitTimeout = null; }
}

function teardownRealtime(){
  try { if (dc) dc.close(); } catch(_) {}
  try { if (stream) stream.getTracks().forEach(t => { try { t.stop(); } catch(_){} }); } catch(_) {}
  try { if (pc) pc.close(); } catch(_) {}
  dc = null; stream = null; pc = null;
  if (audioEl) { try { audioEl.srcObject = null; } catch(_){} audioEl = null; }
}

function ensureFinaleAudioEl(){
  if (finaleAudioEl) return finaleAudioEl;
  finaleAudioEl = new Audio();
  finaleAudioEl.preload = "auto";
  finaleAudioEl.volume = 1;
  return finaleAudioEl;
}

// ✅ FIX 2: warm-start muted on click, keep cached + autoplay unlocked
async function unlockAudioFromUserGesture(){
  try{
    const a = ensureFinaleAudioEl();
    a.src = finaleAudioUrl;
    a.preload = "auto";
    a.load();

    // start muted briefly to guarantee future instant playback
    a.muted = true;
    a.currentTime = 0;

    const p = a.play();
    if (p && typeof p.then === "function") await p;

    // stop immediately, reset to start, unmute
    a.pause();
    a.currentTime = 0;
    a.muted = false;

    audioUnlocked = true;
  } catch(_){
    audioUnlocked = false;
  }
}

// ✅ Finale play: no load, just play
async function playCliffhangerMp3(){
  try {
    const a = ensureFinaleAudioEl();
    a.currentTime = 0;

    const p = a.play();
    if (p && typeof p.then === "function") await p;

    await new Promise((resolve) => {
      a.addEventListener("ended", resolve, { once: true });
      a.addEventListener("error", resolve, { once: true });
      setTimeout(resolve, 1800); // safety
    });
  } catch (_) {}
}

// ✅ Arm finale, wait for response.done (max 2.5s)
function armFinaleThenWait(){
  if (finaleTriggered) return;

  finaleArmed = true;
  armedAtMs = Date.now();

  // If she isn't speaking right now, go immediately
  if (!assistantSpeaking) {
    runFinaleAndRedirect("armed_no_speech");
    return;
  }

  // Safety: force cut after 2.5s if she keeps talking
  if (finaleMaxWaitTimeout) clearTimeout(finaleMaxWaitTimeout);
  finaleMaxWaitTimeout = setTimeout(() => {
    runFinaleAndRedirect("armed_timeout_force");
  }, 2500);
}

// ✅ MP3 first, backend fire-and-forget, redirect after mp3
async function runFinaleAndRedirect(reason = "hardcut"){
  if (finaleTriggered) return;
  finaleTriggered = true;

  // disarm
  finaleArmed = false;
  if (finaleMaxWaitTimeout) { clearTimeout(finaleMaxWaitTimeout); finaleMaxWaitTimeout = null; }

  stopCountdown();
  // keep soft/hard timers cleared
  if (softSteerTimeout) { clearTimeout(softSteerTimeout); softSteerTimeout = null; }
  if (hardCutTimeout) { clearTimeout(hardCutTimeout); hardCutTimeout = null; }

  // stop model asap
  if (dc && dc.readyState === "open") {
    try { dc.send(JSON.stringify({ type: "response.cancel" })); } catch(_) {}
    try { dc.send(JSON.stringify({ type: "output_audio_buffer.clear" })); } catch(_) {}
  }

  // start MP3 immediately
  const playPromise = playCliffhangerMp3();

  // fire-and-forget backend
  const durationSeconds = talkStartedAt ? Math.round((Date.now() - talkStartedAt)/1000) : 0;
  try { track("teaser_finale_triggered", { reason, duration_seconds: durationSeconds, armed_age_ms: Date.now() - armedAtMs, audio_unlocked: !!audioUnlocked }); } catch(_) {}
  try { reportUsage(durationSeconds); } catch(_) {}
  try { sendMemoryUpdate(durationSeconds); } catch(_) {}

  // tear down without blocking UX
  try { teardownRealtime(); } catch(_) {}
  showBackground(false);

  await playPromise;
  window.location.href = "/pricing/";
}

// Robust DataChannel handling
function attachChannel(ch) {
  dc = ch;

  dc.addEventListener("open", () => {
    try {
      dc.send(JSON.stringify({
        type: "session.update",
        session: {
          input_audio_transcription: { model: "gpt-4o-mini-transcribe" },
          turn_detection: { type: "server_vad" }
        }
      }));
    } catch (_) {}
  });

  dc.addEventListener("message", (ev) => {
    try {
      const msg = JSON.parse(ev.data);

      // user transcript streaming
      if (msg?.type === "conversation.item.input_audio_transcription.delta") {
        const itemId = msg?.item_id;
        const delta = String(msg?.delta || "");
        if (itemId && delta) {
          const prev = userTranscriptBuffer.get(itemId) || "";
          userTranscriptBuffer.set(itemId, (prev + delta));
        }
        return;
      }

      if (msg?.type === "conversation.item.input_audio_transcription.completed") {
        const itemId = msg?.item_id;
        const t1 = String(msg?.transcript || "").trim();
        const tBuf = itemId ? String(userTranscriptBuffer.get(itemId) || "").trim() : "";
        const text = (t1 || tBuf).trim();

        if (itemId) userTranscriptBuffer.delete(itemId);
        if (text) convoLog.push({ role: "user", text });
        return;
      }

      if (msg?.type === "conversation.item.created" || msg?.type === "conversation.item.done") {
        const item = msg?.item;
        if (item?.role === "user" && Array.isArray(item?.content)) {
          const text = item.content.map(p => p?.transcript || p?.text || "").join(" ").trim();
          if (text) convoLog.push({ role: "user", text });
        }
      }

      // assistant transcript accumulation
      if (msg?.type === "response.audio_transcript.delta" || msg?.type === "response.output_text.delta") {
        const chunk = String(msg?.delta || "");
        if (chunk) partialAssistant += chunk;

        // mark speaking
        assistantSpeaking = true;
        return;
      }

      if (msg?.type === "response.audio_transcript.done") {
        const full = String(msg?.transcript || msg?.text || "").trim();
        if (full) partialAssistant = full;
        return;
      }

      if (msg?.type === "response.output_text.done") {
        const full = String(msg?.text || "").trim();
        if (full) partialAssistant = full;
        return;
      }

      if (msg?.type === "response.done") {
        const final = String(partialAssistant || "").trim();
        if (final && final !== lastAssistantFinal) {
          convoLog.push({ role: "assistant", text: final });
          lastAssistantFinal = final;
        }
        partialAssistant = "";

        // mark finished utterance
        assistantSpeaking = false;

        // if finale armed, trigger now (clean end)
        if (finaleArmed && !finaleTriggered) {
          runFinaleAndRedirect("after_response_done");
        }
      }
    } catch (_) {}
  });
}

function setupDataChannelLogging() {
  pc.ondatachannel = (e) => attachChannel(e.channel);
  try { attachChannel(pc.createDataChannel("oai-events")); } catch (_) {}
}

async function startVoice(){
  startBtn.disabled = true;
  logoutBtn.disabled = true;
  endBtn.disabled = true;

  // ✅ unlock + warm audio on click
  await unlockAudioFromUserGesture();

  finaleTriggered = false;
  finaleArmed = false;
  assistantSpeaking = false;
  armedAtMs = 0;
  if (finaleMaxWaitTimeout) { clearTimeout(finaleMaxWaitTimeout); finaleMaxWaitTimeout = null; }
  clearFinaleTimers();

  headline.textContent = "Sophie is joining…";
  setStatus("connecting..");
  showBackground(true);

  track("talk_start_clicked");

  // reset convo buffers
  convoLog = [];
  partialAssistant = "";
  lastAssistantFinal = "";
  userTranscriptBuffer.clear();

  try{
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.user) { window.location.href = "/login/"; return; }

    const tokenRes = await fetch("/api/session", {
      headers: { Authorization: `Bearer ${session.access_token}` }
    });

    const data = await safeJson(tokenRes);

    if (tokenRes.status === 402) {
      track("time_limit_reached");
      window.location.href = "/pricing/";
      return;
    }

    if (!tokenRes.ok) {
      const msg = data?.error || `Kein Zugriff (HTTP ${tokenRes.status}).`;
      setStatus(msg);
      headline.textContent = "Sophie is waiting.";
      showBackground(false);
      startBtn.disabled = false;
      logoutBtn.disabled = false;
      endBtn.disabled = true;
      track("talk_start_failed", { http_status: tokenRes.status, message: msg });
      return;
    }

    isPremium = !!data?.is_premium;
    plan = data?.plan || null;

    remainingSeconds = (typeof data?.remaining_seconds === "number")
      ? Math.max(0, data.remaining_seconds)
      : 0;

    teaserMode = !!data?.teaser_mode;
    teaserSoftAt = Number(data?.teaser_soft_steer_at_seconds || 0);
    teaserHardAt = Number(data?.teaser_max_seconds || 0);

    // always use fixed path unless server overrides
    finaleAudioUrl = String(data?.teaser_final_audio || "/audio/cliffhanger.mp3").trim() || "/audio/cliffhanger.mp3";

    renderTimer();

    if (remainingSeconds <= 0) {
      track("time_limit_reached");
      window.location.href = "/pricing/";
      return;
    }

    pc = new RTCPeerConnection();
    setupDataChannelLogging();

    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    audioEl = document.createElement("audio");
    audioEl.autoplay = true;
    audioEl.playsInline = true;
    pc.ontrack = e => audioEl.srcObject = e.streams[0];

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const baseUrl = "https://api.openai.com/v1/realtime";
    const model = "gpt-4o-realtime-preview";

    const sdpRes = await fetch(`${baseUrl}?model=${model}`, {
      method: "POST",
      body: offer.sdp,
      headers: {
        Authorization: `Bearer ${data.client_secret.value}`,
        "Content-Type": "application/sdp"
      },
    });

    if (!sdpRes.ok) {
      const t = await sdpRes.text().catch(() => "");
      throw new Error(`OpenAI SDP Fehler (HTTP ${sdpRes.status}): ${t.slice(0, 200)}`);
    }

    const answer = { type: "answer", sdp: await sdpRes.text() };
    await pc.setRemoteDescription(answer);

    endBtn.disabled = false;
    headline.textContent = "Sophie is listening.";
    setStatus("Live.");

    talkStartedAt = Date.now();

    track("talk_started", {
      is_premium: isPremium,
      plan: plan || null,
      remaining_seconds_at_start: remainingSeconds,
      teaser_mode: !!teaserMode,
      teaser_soft_at: teaserSoftAt || null,
      teaser_hard_at: teaserHardAt || null,
      finale_audio_url: finaleAudioUrl || null,
      audio_unlocked: !!audioUnlocked,
    });

    startCountdown();

    // ✅ Soft steer
    if (teaserMode && !isPremium) {
      if (teaserSoftAt > 0) {
        softSteerTimeout = setTimeout(() => {
          if (!dc || dc.readyState !== "open" || finaleTriggered) return;
          try {
            dc.send(JSON.stringify({
              type: "response.create",
              response: {
                modalities: ["text"],
                instructions: `
For the next 8–12 seconds:
- soften and slow down (short sentences)
- gently build tension, but do NOT resolve anything
- IMPORTANT: finish your current sentence cleanly
- then say ONE final short line that invites a continuation
- then stop speaking and hold a calm pause (no extra filler, no new topic)
Do not mention time, limits, pricing, or paywalls.
`
              }
            }));
            track("teaser_soft_steer_sent", { at_seconds: teaserSoftAt });
          } catch (_) {}
        }, teaserSoftAt * 1000);
      }

      // ✅ Hard cut: ARM and wait for response.done
      if (teaserHardAt > 0) {
        hardCutTimeout = setTimeout(() => {
          armFinaleThenWait();
        }, teaserHardAt * 1000);
      }
    }

  } catch(err){
    console.error(err);
    setStatus("Fail to Start.");
    headline.textContent = "Sophie is waiting.";
    track("talk_start_exception", { message: String(err?.message || err) });
    await stopVoice(false);
  } finally {
    startBtn.disabled = false;
    logoutBtn.disabled = false;
  }
}

async function stopVoice(triggeredByLimit = false){
  endBtn.disabled = true;
  clearFinaleTimers();
  finaleArmed = false;

  const durationSeconds = talkStartedAt
    ? Math.round((Date.now() - talkStartedAt) / 1000)
    : 0;

  if (durationSeconds > 0) reportUsage(durationSeconds);
  sendMemoryUpdate(durationSeconds);

  track("talk_ended", {
    duration_seconds: durationSeconds || null,
    is_premium: isPremium,
    plan: plan || null,
    remaining_seconds_at_end: remainingSeconds,
    triggered_by_limit: !!triggeredByLimit
  });

  talkStartedAt = null;

  stopCountdown();
  teardownRealtime();

  showBackground(false);

  startBtn.disabled = false;
  logoutBtn.disabled = false;
  headline.textContent = "Sophie is waiting.";
  setStatus("Ended.");
}

logoutBtn.onclick = async () => {
  try {
    track("logout_clicked");
    if (pc || stream || talkStartedAt) await stopVoice(false);
  } catch(_) {}
  try { await supabase.auth.signOut(); } catch(_) {}
  window.location.href = "/";
};

startBtn.addEventListener("click", startVoice);
endBtn.addEventListener("click", () => stopVoice(false));
</script>

</body>
</html>
