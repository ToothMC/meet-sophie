<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sophie Voice</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:white;
  text-align:center;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b0f14;
  position:relative;
  overflow:hidden;
}

/* Topbar */
.topbar{
  position:fixed;
  top:0; left:0; right:0;
  z-index:3;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
}

.topbar a{
  color:rgba(255,255,255,.9);
  text-decoration:none;
  font-weight:600;
  padding:8px 10px;
  border-radius:10px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
}

.topbar button{
  color:rgba(255,255,255,.9);
  font-weight:600;
  padding:8px 10px;
  border-radius:10px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  cursor:pointer;
}

.topbar button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* Hintergrundbild */
.bg{
  position:fixed;
  inset:0;
  background:url("/sophie.jpg") center/cover no-repeat;
  opacity:0;
  transition:opacity .5s ease;
  z-index:0;
}

/* dunkles Overlay */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  opacity:0;
  transition:opacity .5s ease;
  z-index:1;
}

/* Aktiv-Zustand */
.bg.active,
.overlay.active{ opacity:1; }

/* Vordergrund */
.wrap{
  position:relative;
  z-index:2;
  width:90%;
  max-width:420px;
  padding-top:40px;
}

/* Buttons */
.btn{
  display:block;
  width:100%;
  margin:0 auto 15px;
  padding:18px 20px;
  font-size:20px;
  font-weight:700;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

#start{ background:#ffffff; color:#000; }
#end{
  background:rgba(255,255,255,.15);
  color:#fff;
  border:1px solid rgba(255,255,255,.3);
}

.btn:disabled{ opacity:.5; cursor:not-allowed; }

.status{ margin-bottom:10px; opacity:.88; }
.timer{ margin-bottom:20px; opacity:.75; font-size:14px; }
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay" id="overlay"></div>

<div class="topbar">
  <a href="/">← Landing</a>
  <button id="logoutBtn" type="button">Logout</button>
</div>

<div class="wrap">
  <h2 id="headline">Sophie is here.</h2>
  <div class="status" id="status">Whenever you’re ready.</div>
  <div class="timer" id="timer">Zeit: --:--</div>

  <button id="start" class="btn">Enter the Room</button>
  <button id="end" class="btn" disabled>Leave the Room</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// ✅ Supabase Config
const SUPABASE_URL = "https://ohzfojsbmzinpxhcynpt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oemZvanNibXppbnB4aGN5bnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0Mzc1MjcsImV4cCI6MjA4NzAxMzUyN30.7eGSeEvOCj9vMqFJj9C0SR8DiiYygbFUvpQ8rIVEc0I";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ✅ Frontend Login Guard: ohne Session -> /login/
{
  const { data: { session } } = await supabase.auth.getSession();
  if (!session?.user) window.location.href = "/login/";
}

// Helpers
async function safeJson(res) { try { return await res.json(); } catch { return null; } }

// --- Tracking helper (POST /api/track) ---
async function track(event_name, meta = {}) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.access_token) return;

    await fetch("/api/track", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ event_name, meta }),
      keepalive: true,
    });
  } catch (_) {}
}

// --- Usage reporting helper (POST /api/usage) ---
async function reportUsage(secondsUsed) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.access_token) return;

    await fetch("/api/usage", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ seconds_used: secondsUsed }),
      keepalive: true,
    });
  } catch (_) {}
}

// --- Conversation buffer (for memory update) ---
let convoLog = [];
let partialAssistant = "";
let lastAssistantFinal = "";
const userTranscriptBuffer = new Map();

// --- Memory update helper (POST /api/memory-update) ---
async function sendMemoryUpdate(secondsUsed) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.access_token) return;

    const finalA = (partialAssistant || "").trim();
    if (finalA) {
      convoLog.push({ role: "assistant", text: finalA });
      partialAssistant = "";
    }

    const cleaned = (convoLog || []).filter(t => {
      const role = String(t?.role || "");
      const text = String(t?.text || "").trim();
      if (!text) return false;
      if (role === "user" && text.toLowerCase() === "bye.") return false;
      return true;
    });

    const payload = cleaned.slice(-80);

    await fetch("/api/memory-update", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ transcript: payload, seconds_used: secondsUsed }),
      keepalive: true,
    });

    convoLog = [];
  } catch (_) {}
}

// UI Elements
const startBtn = document.getElementById("start");
const endBtn   = document.getElementById("end");
const statusEl = document.getElementById("status");
const timerEl  = document.getElementById("timer");
const headline = document.getElementById("headline");
const bg = document.getElementById("bg");
const overlay = document.getElementById("overlay");
const logoutBtn = document.getElementById("logoutBtn");

// Voice vars
let pc = null;
let stream = null;
let audioEl = null;

// DataChannel
let dc = null;

// Timer vars
let countdown = null;
let remainingSeconds = 0;
let isPremium = false;
let plan = null;

// Session meta
let talkStartedAt = null;

// Teaser (client-controlled)
let teaserMode = false;
let teaserTargetSec = 120;
let teaserSoftSteerAtSec = 110;
let teaserMaxSec = 150;
let teaserRedirectUrl = "/pricing/";
let finalAudioEn = "/final_en.mp3";
let finalAudioDe = "/final_de.mp3";
let preferredLanguage = "en";

// timeouts
let softSteerTimeout = null;
let hardStopTimeout = null;

// guard
let hardStopTriggered = false;

function setStatus(txt){ statusEl.textContent = txt; }
function showBackground(on){
  bg.classList.toggle("active", !!on);
  overlay.classList.toggle("active", !!on);
}

function formatMMSS(sec){
  const s = Math.max(0, Math.floor(Number(sec) || 0));
  const m = String(Math.floor(s/60)).padStart(2,"0");
  const r = String(s%60).padStart(2,"0");
  return `${m}:${r}`;
}

function renderTimer(){
  timerEl.textContent = `Zeit: ${formatMMSS(remainingSeconds)}`;
}
renderTimer();

function startCountdown(){
  if (countdown) clearInterval(countdown);
  countdown = setInterval(() => {
    remainingSeconds -= 1;
    renderTimer();

    if (remainingSeconds <= 0) {
      stopCountdown();
      setStatus("Zeitlimit erreicht.");

      track("time_limit_reached", { plan: plan || null });

      // fall back: pricing (hard stop path will handle audio+redirect)
      hardStopToPricing("time_limit_reached");
    }
  }, 1000);
}

function stopCountdown(){
  if (countdown) { clearInterval(countdown); countdown = null; }
}

function clearTeaserTimers(){
  if (softSteerTimeout) { clearTimeout(softSteerTimeout); softSteerTimeout = null; }
  if (hardStopTimeout) { clearTimeout(hardStopTimeout); hardStopTimeout = null; }
}

function teardownRealtime(){
  try { if (dc) dc.close(); } catch(_) {}
  try { if (stream) stream.getTracks().forEach(t => { try { t.stop(); } catch(_){} }); } catch(_) {}
  try { if (pc) pc.close(); } catch(_) {}
  dc = null; stream = null; pc = null;
  if (audioEl) { try { audioEl.srcObject = null; } catch(_){} audioEl = null; }
}

// Robust DataChannel handling: server-created + client-created
function attachChannel(ch) {
  dc = ch;

  dc.addEventListener("open", () => {
    try {
      dc.send(JSON.stringify({
        type: "session.update",
        session: {
          input_audio_transcription: { model: "gpt-4o-mini-transcribe" },
          turn_detection: { type: "server_vad" }
        }
      }));
    } catch (_) {}
  });

  dc.addEventListener("message", (ev) => {
    try {
      const msg = JSON.parse(ev.data);

      // user transcript streaming
      if (msg?.type === "conversation.item.input_audio_transcription.delta") {
        const itemId = msg?.item_id;
        const delta = String(msg?.delta || "");
        if (itemId && delta) {
          const prev = userTranscriptBuffer.get(itemId) || "";
          userTranscriptBuffer.set(itemId, (prev + delta));
        }
        return;
      }

      if (msg?.type === "conversation.item.input_audio_transcription.completed") {
        const itemId = msg?.item_id;
        const t1 = String(msg?.transcript || "").trim();
        const tBuf = itemId ? String(userTranscriptBuffer.get(itemId) || "").trim() : "";
        const text = (t1 || tBuf).trim();

        if (itemId) userTranscriptBuffer.delete(itemId);
        if (text) convoLog.push({ role: "user", text });
        return;
      }

      // assistant transcript for memory
      if (msg?.type === "response.audio_transcript.delta" || msg?.type === "response.output_text.delta") {
        const chunk = String(msg?.delta || "");
        if (chunk) partialAssistant += chunk;
        return;
      }

      if (msg?.type === "response.audio_transcript.done") {
        const full = String(msg?.transcript || msg?.text || "").trim();
        if (full) partialAssistant = full;
        return;
      }

      if (msg?.type === "response.output_text.done") {
        const full = String(msg?.text || "").trim();
        if (full) partialAssistant = full;
        return;
      }

      if (msg?.type === "response.done") {
        const final = String(partialAssistant || "").trim();
        if (final && final !== lastAssistantFinal) {
          convoLog.push({ role: "assistant", text: final });
          lastAssistantFinal = final;
        }
        partialAssistant = "";
      }
    } catch (_) {}
  });
}

function setupDataChannelLogging() {
  pc.ondatachannel = (e) => attachChannel(e.channel);
  try { attachChannel(pc.createDataChannel("oai-events")); } catch (_) {}
}

// ---- Soft steering: ask model to wrap up soon (but never say final line) ----
function sendSoftSteerWrapUp(){
  if (!dc || dc.readyState !== "open") return;
  try {
    dc.send(JSON.stringify({
      type: "response.create",
      response: {
        modalities: ["audio","text"],
        instructions: `
Wrap up the current conversation in the next 20–30 seconds.
Build a gentle cliffhanger and then pause.
Do NOT say the final cliffhanger line. The client will play it.
Do NOT say: "Stay with me" (or close variants).
Keep it intimate, calm, and natural. Ask at most ONE short question.
`
      }
    }));
    track("teaser_soft_steer_sent");
  } catch(_) {}
}

// ---- Final line audio (client controlled) ----
async function playFinalLineAudio(){
  const src = (preferredLanguage === "de") ? finalAudioDe : finalAudioEn;

  // fallback: if DE file missing, use EN
  const audio = new Audio();
  audio.preload = "auto";
  audio.src = src;

  // Try play; if fails, fallback to EN
  try {
    await audio.play();
  } catch (e) {
    if (src !== finalAudioEn) {
      try {
        audio.src = finalAudioEn;
        await audio.play();
      } catch(_) {}
    }
  }

  // Wait end or timeout (guarantee progress)
  await new Promise((resolve) => {
    let done = false;
    const finish = () => { if (done) return; done = true; resolve(); };

    audio.addEventListener("ended", finish, { once: true });
    audio.addEventListener("error", finish, { once: true });

    setTimeout(finish, 1600); // safety fallback
  });
}

// ---- Hard stop: cancel realtime, play final line, redirect ----
async function hardStopToPricing(reason="hard_stop"){
  if (hardStopTriggered) return;
  hardStopTriggered = true;

  clearTeaserTimers();
  stopCountdown();

  track("teaser_hard_stop", { reason });

  // cancel model output immediately
  if (dc && dc.readyState === "open") {
    try { dc.send(JSON.stringify({ type: "response.cancel" })); } catch(_) {}
    try { dc.send(JSON.stringify({ type: "output_audio_buffer.clear" })); } catch(_) {}
  }

  // compute duration before teardown
  const durationSeconds = talkStartedAt
    ? Math.round((Date.now() - talkStartedAt) / 1000)
    : 0;

  // teardown realtime fast
  teardownRealtime();

  // report usage + memory (best effort)
  try { if (durationSeconds > 0) await reportUsage(durationSeconds); } catch(_) {}
  try { await sendMemoryUpdate(durationSeconds); } catch(_) {}

  // play final line (client audio)
  try { await playFinalLineAudio(); } catch(_) {}

  // redirect
  window.location.href = teaserRedirectUrl || "/pricing/";
}

async function startVoice(){
  startBtn.disabled = true;
  logoutBtn.disabled = true;
  endBtn.disabled = true;

  headline.textContent = "Sophie is joining…";
  setStatus("connecting..");
  showBackground(true);

  track("talk_start_clicked");

  // reset convo buffers
  convoLog = [];
  partialAssistant = "";
  lastAssistantFinal = "";
  userTranscriptBuffer.clear();

  clearTeaserTimers();
  hardStopTriggered = false;

  try{
    const { data: { session } } = await supabase.auth.getSession();
    if (!session?.user) { window.location.href = "/login/"; return; }

    const tokenRes = await fetch("/api/session", {
      headers: { Authorization: `Bearer ${session.access_token}` }
    });

    const data = await safeJson(tokenRes);

    if (tokenRes.status === 402) {
      track("time_limit_reached");
      window.location.href = "/pricing/";
      return;
    }

    if (!tokenRes.ok) {
      const msg = data?.error || `Kein Zugriff (HTTP ${tokenRes.status}).`;
      setStatus(msg);
      headline.textContent = "Sophie is waiting.";
      showBackground(false);
      startBtn.disabled = false;
      logoutBtn.disabled = false;
      endBtn.disabled = true;
      track("talk_start_failed", { http_status: tokenRes.status, message: msg });
      return;
    }

    isPremium = !!data?.is_premium;
    plan = data?.plan || null;

    preferredLanguage = String(data?.preferred_language || "en").toLowerCase().trim() || "en";

    remainingSeconds = (typeof data?.remaining_seconds === "number")
      ? Math.max(0, data.remaining_seconds)
      : 0;

    renderTimer();
    if (remainingSeconds <= 0) {
      track("time_limit_reached");
      window.location.href = "/pricing/";
      return;
    }

    // teaser config
    teaserMode = !!data?.teaser_mode && !isPremium;
    teaserTargetSec = Number(data?.teaser_target_seconds || 120);
    teaserSoftSteerAtSec = Number(data?.teaser_soft_steer_at_seconds || 110);
    teaserMaxSec = Number(data?.teaser_max_seconds || 150);
    teaserRedirectUrl = String(data?.teaser_redirect_url || "/pricing/") || "/pricing/";
    finalAudioEn = String(data?.teaser_final_audio_en || "/final_en.mp3");
    finalAudioDe = String(data?.teaser_final_audio_de || "/final_de.mp3");

    // Build realtime connection
    pc = new RTCPeerConnection();
    setupDataChannelLogging();

    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    audioEl = document.createElement("audio");
    audioEl.autoplay = true;
    audioEl.playsInline = true;
    pc.ontrack = e => audioEl.srcObject = e.streams[0];

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const baseUrl = "https://api.openai.com/v1/realtime";
    const model = "gpt-4o-realtime-preview";

    const sdpRes = await fetch(`${baseUrl}?model=${model}`, {
      method: "POST",
      body: offer.sdp,
      headers: {
        Authorization: `Bearer ${data.client_secret.value}`,
        "Content-Type": "application/sdp"
      },
    });

    if (!sdpRes.ok) {
      const t = await sdpRes.text().catch(() => "");
      throw new Error(`OpenAI SDP Fehler (HTTP ${sdpRes.status}): ${t.slice(0, 200)}`);
    }

    const answer = { type: "answer", sdp: await sdpRes.text() };
    await pc.setRemoteDescription(answer);

    endBtn.disabled = false;
    headline.textContent = "Sophie is listening.";
    setStatus("Live.");

    talkStartedAt = Date.now();

    track("talk_started", {
      is_premium: isPremium,
      plan: plan || null,
      remaining_seconds_at_start: remainingSeconds,
      teaser_mode: teaserMode,
      teaser_max_seconds: teaserMaxSec
    });

    // Timers:
    // 1) normal countdown remains for global remaining_seconds
    startCountdown();

    // 2) teaser timers: only when teaserMode
    if (teaserMode) {
      // Soft steer at ~1:50
      softSteerTimeout = setTimeout(() => {
        if (!hardStopTriggered) sendSoftSteerWrapUp();
      }, Math.max(0, teaserSoftSteerAtSec * 1000));

      // Hard stop at 2:30 (or earlier if remainingSeconds lower)
      const hardStopMs = Math.min(teaserMaxSec * 1000, remainingSeconds * 1000);
      hardStopTimeout = setTimeout(() => {
        hardStopToPricing("teaser_hard_stop_timeout");
      }, Math.max(0, hardStopMs));
    }

  } catch(err){
    console.error(err);
    setStatus("Fail to Start.");
    headline.textContent = "Sophie is waiting.";
    track("talk_start_exception", { message: String(err?.message || err) });
    await stopVoice(false);
  } finally {
    startBtn.disabled = false;
    logoutBtn.disabled = false;
  }
}

async function stopVoice(triggeredByLimit = false){
  endBtn.disabled = true;
  clearTeaserTimers();

  const durationSeconds = talkStartedAt
    ? Math.round((Date.now() - talkStartedAt) / 1000)
    : 0;

  // Usage immer reporten (Backend entscheidet den Bucket)
  if (durationSeconds > 0) await reportUsage(durationSeconds);

  await sendMemoryUpdate(durationSeconds);

  track("talk_ended", {
    duration_seconds: durationSeconds || null,
    is_premium: isPremium,
    plan: plan || null,
    remaining_seconds_at_end: remainingSeconds,
    triggered_by_limit: !!triggeredByLimit
  });

  talkStartedAt = null;

  stopCountdown();
  teardownRealtime();

  showBackground(false);

  startBtn.disabled = false;
  logoutBtn.disabled = false;
  headline.textContent = "Sophie is waiting.";
  setStatus("Ended.");
}

logoutBtn.onclick = async () => {
  try {
    track("logout_clicked");
    if (pc || stream || talkStartedAt) await stopVoice(false);
  } catch(_) {}
  try { await supabase.auth.signOut(); } catch(_) {}
  window.location.href = "/";
};

startBtn.addEventListener("click", startVoice);
endBtn.addEventListener("click", () => stopVoice(false));
</script>

</body>
