body{

}

/* HERO SECTION */
.hero{
  min-height:calc(100svh - 70px);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;

}

/* TOP URL */
.top{

/* CENTER TEXT */
.center{
  text-align:center;
  margin-top:40px;

  color:#000;
  text-decoration:none;
  padding:18px 20px;
  border-radius:14px;
  text-align:center;
  font-weight:700;
  font-size:18px;
  letter-spacing:.3px;
  box-shadow:0 18px 40px rgba(0,0,0,.45);
  transition:all .15s ease;
}

.btn:hover{
  transform:translateY(-2px);
}

/* FOOTER */
.site-footer{
  text-align:center;
  padding:20px 0;
  font-size:12px;
  opacity:.7;
  background:#000;
}

.site-footer a{
  color:#fff;
  margin:0 12px;
  text-decoration:none;
}

.site-footer a:hover{
  text-decoration:underline;
}

/* MOBILE */
@media (max-width:480px){
  h1{font-size:56px}
  .btn{
    padding:20px;

    border-radius:16px;
